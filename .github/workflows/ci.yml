name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore
        shell: pwsh
        run: dotnet restore .\DotNetFWOtelPub.sln

      - name: Build
        shell: pwsh
        run: dotnet build .\DotNetFWOtelPub.sln -c Release --no-restore

      - name: Test
        shell: pwsh
        run: dotnet test .\DotNetFWOtelPub.sln -c Release --no-build
