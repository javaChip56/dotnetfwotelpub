name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Package version to release, for example 1.0.1
        required: true
        type: string
      publish_to_nuget:
        description: Publish packages to NuGet.org
        required: true
        type: boolean
        default: false
      create_github_release:
        description: Create or update a GitHub release for this version
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build-pack:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact_name: ${{ steps.artifact_name.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          }
          else {
            $refName = "${{ github.ref_name }}"
            if ($refName.StartsWith("v")) {
              $version = $refName.Substring(1)
            }
            else {
              $version = $refName
            }
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Unable to resolve release version."
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set artifact name
        id: artifact_name
        shell: pwsh
        run: |
          $artifactName = "nuget-packages-${{ steps.version.outputs.version }}"
          "value=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build, test, and pack
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\pack-release.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -SkipCollectorValidation

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.value }}
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error

  github-release:
    needs: build-pack
    runs-on: windows-latest
    if: github.event_name == 'push' || inputs.create_github_release
    permissions:
      contents: write

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-pack.outputs.artifact_name }}
          path: .\packages

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v${{ needs.build-pack.outputs.version }}"
          $files = Get-ChildItem .\packages -File | ForEach-Object { $_.FullName }

          gh release view $tag --json tagName --jq .tagName *> $null

          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $files --clobber
          }
          else {
            gh release create $tag $files --title $tag --generate-notes
          }

  publish-nuget:
    needs: build-pack
    runs-on: windows-latest
    if: github.event_name == 'push' || inputs.publish_to_nuget
    environment: nuget

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-pack.outputs.artifact_name }}
          path: .\packages

      - name: Validate NuGet API key
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw "NUGET_API_KEY is not configured. Add it as a repository or environment secret before publishing."
          }

      - name: Publish to NuGet.org
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\publish-nuget.ps1 `
            -Version "${{ needs.build-pack.outputs.version }}" `
            -PackageDir ".\packages" `
            -ApiKey $env:NUGET_API_KEY
